<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madrid TCG Events</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page">

  <!-- Site header -->
  <div class="site-header">
    <div>
      <h1>Madrid TCG Events</h1>
      <div class="subtitle">TCG tournaments and events in Madrid</div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="btn" @click="prevWeek">← Prev</button>
    <button class="btn current" @click="goToday">Today</button>
    <button class="btn" @click="nextWeek">Next →</button>
    <span class="week-range" x-text="weekRangeLabel"></span>
    <span class="count-badge" x-show="!loading">
      <span x-text="weekEventCount"></span>
      <span x-text="weekEventCount === 1 ? 'event' : 'events'"></span> this week
    </span>
    <div class="view-toggle" style="margin-left:auto">
      <button :class="{ active: viewMode === 'horizontal' }" @click="setView('horizontal')">⊞ Horizontal</button>
      <button :class="{ active: viewMode === 'vertical' }"   @click="setView('vertical')">≡ Vertical</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" @keydown.escape.window="openFacet = null">
    <div class="filter-group">
      <label>Search</label>
      <input type="text" placeholder="Title…" x-model.debounce.250ms="filters.search" />
    </div>
    <div class="filter-group">
      <label>Game</label>
      <div class="facet" @click.outside="openFacet = openFacet === 'game' ? null : openFacet">
        <button class="facet-btn" type="button" @click="toggleFacetPanel('game')" :aria-expanded="openFacet === 'game'">
          <span class="facet-summary" x-text="facetSummary('game', 'All games')"></span>
          <span class="facet-caret">▾</span>
        </button>
        <div class="facet-panel" x-show="openFacet === 'game'">
          <div class="facet-actions" x-show="filters.game.length">
            <button class="facet-clear" type="button" @click="clearFacet('game')">All</button>
          </div>
          <template x-for="g in gameOptions" :key="g">
            <label class="facet-option">
              <input type="checkbox" :checked="isSelected('game', g)" @change="toggleFilter('game', g)">
              <span class="facet-option-label" x-text="g"></span>
              <span class="facet-option-count" x-text="facetOptionCount('game', g)"></span>
            </label>
          </template>
          <div class="facet-empty" x-show="gameOptions.length === 0">No games</div>
        </div>
      </div>
    </div>
    <div class="filter-group">
      <label>Store</label>
      <div class="facet" @click.outside="openFacet = openFacet === 'store' ? null : openFacet">
        <button class="facet-btn" type="button" @click="toggleFacetPanel('store')" :aria-expanded="openFacet === 'store'">
          <span class="facet-summary" x-text="facetSummary('store', 'All stores')"></span>
          <span class="facet-caret">▾</span>
        </button>
        <div class="facet-panel" x-show="openFacet === 'store'">
          <div class="facet-actions" x-show="filters.store.length">
            <button class="facet-clear" type="button" @click="clearFacet('store')">All</button>
          </div>
          <template x-for="s in storeOptions" :key="s">
            <label class="facet-option">
              <input type="checkbox" :checked="isSelected('store', s)" @change="toggleFilter('store', s)">
              <span class="facet-option-label" x-text="s"></span>
              <span class="facet-option-count" x-text="facetOptionCount('store', s)"></span>
            </label>
          </template>
          <div class="facet-empty" x-show="storeOptions.length === 0">No stores</div>
        </div>
      </div>
    </div>
    <div class="filter-group">
      <label>Format</label>
      <div class="facet" @click.outside="openFacet = openFacet === 'format' ? null : openFacet">
        <button class="facet-btn" type="button" @click="toggleFacetPanel('format')" :aria-expanded="openFacet === 'format'">
          <span class="facet-summary" x-text="facetSummary('format', 'All formats')"></span>
          <span class="facet-caret">▾</span>
        </button>
        <div class="facet-panel" x-show="openFacet === 'format'">
          <div class="facet-actions" x-show="filters.format.length">
            <button class="facet-clear" type="button" @click="clearFacet('format')">All</button>
          </div>
          <template x-for="f in formatOptions" :key="f">
            <label class="facet-option">
              <input type="checkbox" :checked="isSelected('format', f)" @change="toggleFilter('format', f)">
              <span class="facet-option-label" x-text="f"></span>
              <span class="facet-option-count" x-text="facetOptionCount('format', f)"></span>
            </label>
          </template>
          <div class="facet-empty" x-show="formatOptions.length === 0">No formats</div>
        </div>
      </div>
    </div>
    <button class="btn" style="align-self:flex-end" @click="resetFilters">✕ Clear</button>
    <button class="btn" style="align-self:flex-end" @click="saveCurrentPreset">Save preset</button>
  </div>

  <!-- Saved filter presets -->
  <div class="preset-bar" x-show="savedPresets.length">
    <span class="preset-label">Presets</span>
    <template x-for="preset in savedPresets" :key="preset.id">
      <span class="preset-chip">
        <button class="preset-apply" type="button" @click="applyPreset(preset)" x-text="preset.name"></button>
        <button class="preset-remove" type="button" @click.stop="deletePreset(preset.id)" :aria-label="'Delete preset ' + preset.name">×</button>
      </span>
    </template>
  </div>

  <!-- Time-segment filter -->
  <div class="seg-filter" x-show="!loading">
    <span class="seg-label">Time</span>
    <template x-for="s in SEGMENTS" :key="s.key">
      <button
        class="seg-chip"
        :class="{ active: segmentFilter[s.key] }"
        @click="toggleSegment(s.key)"
        :title="s.range"
      >
        <span x-text="s.label"></span>
        <span class="seg-count" x-text="segmentTotals[s.key]" x-show="segmentTotals[s.key] > 0"></span>
      </button>
    </template>
  </div>

  <!-- Loading -->
  <div class="state-msg" x-show="loading">Loading events…</div>

  <!-- Calendar grid -->
  <div class="cal-wrap" :class="'view-' + viewMode" x-show="!loading">

    <!-- ── HORIZONTAL: global grid; segments aligned across days ── -->
    <template x-if="viewMode === 'horizontal'">
    <div class="cal-grid cal-grid-h"
         @click="onGridClick($event)"
         :style="`grid-template-rows: auto repeat(${activeSegments.length}, auto)`">

      <!-- Day-header row -->
      <template x-for="(day, dIdx) in weekDays" :key="'h-' + day.iso">
        <div class="day-cell day-header-cell"
             :class="{ 'is-today': day.isToday }"
             :id="'day-' + day.iso"
             :style="`grid-column: ${dIdx + 1}; grid-row: 1;`">
          <div class="dow" x-text="day.dow"></div>
          <div class="dom" x-text="day.dom"></div>
        </div>
      </template>

      <!-- Segment × day cells, flattened to a single x-for to avoid
           Alpine's triple-nested-template processing quirk. -->
      <template x-for="cell in cells" :key="cell.key">
        <div class="day-cell seg-cell"
             :class="[
               cell.isToday ? 'is-today' : '',
               cell.isEmpty ? 'is-empty' : '',
               collapsedSegments[cell.seg.key] ? 'is-collapsed' : '',
               cell.isPast ? 'is-past' : ''
             ]"
             :style="`grid-column: ${cell.dIdx + 1}; grid-row: ${cell.sIdx + 2};`">
          <!-- Header always present when the cell has events, regardless
               of collapsed state. -->
          <div class="seg-header is-clickable"
               x-show="!focusMode && cell.events.length > 0"
               @click="toggleSegmentCollapse(cell.seg.key)"
               :title="collapsedSegments[cell.seg.key] ? 'Expand' : 'Collapse'">
            <span class="seg-chev" :class="{ 'is-collapsed': collapsedSegments[cell.seg.key] }"></span>
            <span x-text="cell.seg.label"></span>
            <span class="seg-header-count" x-text="'· ' + cell.events.length"></span>
            <span class="seg-range" x-text="cell.seg.shortRange"></span>
          </div>
          <!-- Cards rendered as raw HTML to bypass an Alpine quirk where
               nested <template x-for> inside dynamically cloned content
               doesn't re-fire when the outer iterable rebuilds. The grid
               root has a single delegated @click that handles card
               clicks and chip toggles via data- attributes. -->
          <div class="seg-cards"
               x-html="cellCardsHtml(cell)"
               x-show="!collapsedSegments[cell.seg.key]"></div>
        </div>
      </template>
    </div>
    </template>

    <!-- ── VERTICAL: per-day stacked layout (unchanged) ── -->
    <template x-if="viewMode === 'vertical'">
    <div class="cal-grid">
      <template x-for="day in weekDays" :key="day.iso">
        <div class="day-col" :id="'day-' + day.iso" :class="{ 'is-today': day.isToday }">

          <!-- Day header -->
          <div class="day-header">
            <div class="dow" x-text="day.dow"></div>
            <div class="dom" x-text="day.dom"></div>
          </div>

          <!-- Events list — grouped by time segment -->
          <div class="day-events">
            <template x-if="day.segments.length === 0">
              <div class="no-events">No events</div>
            </template>

            <template x-for="seg in day.segments" :key="seg.key">
              <div class="seg-block" :id="'seg-' + seg.key" :data-seg-key="seg.key">
                <div class="seg-header" x-show="!focusMode">
                  <span x-text="seg.label"></span>
                  <span class="seg-header-count" x-text="'· ' + seg.count"></span>
                  <span class="seg-range" x-text="seg.shortRange"></span>
                </div>
                <template x-for="e in seg.events" :key="e.source_url + e.datetime_start">
                  <div class="ev-card"
                       :class="[ getGameClass(e.game), isEventPast(e) ? 'is-past' : '' ]"
                       @click="openEvent(e)">
                    <div class="ev-card-top">
                      <div class="ev-time" x-text="formatTime(e.datetime_start)"></div>
                      <div class="ev-store-top"
                           :class="{ active: isSelected('store', e.store) }"
                           @click.stop="toggleFilter('store', e.store)"
                           :title="e.store"
                           x-text="e.store"></div>
                    </div>
                    <div class="ev-title" x-text="e.title"></div>
                    <div class="ev-footer">
                      <div class="ev-tags">
                        <span class="tag game"
                          :class="{ active: isSelected('game', e.game || 'Unknown') }"
                          @click.stop="toggleFilter('game', e.game || 'Unknown')"
                          x-text="e.game || 'Unknown'"></span>
                        <span class="tag fmt"
                          :class="{ active: isSelected('format', e.format || 'Unknown') }"
                          @click.stop="toggleFilter('format', e.format || 'Unknown')"
                          x-text="e.format || 'Unknown'"></span>
                      </div>
                      <button
                        class="calendar-btn"
                        type="button"
                        x-show="canAddToCalendar(e)"
                        @click.stop="openCalendar(e)"
                        title="Add to Google Calendar"
                        aria-label="Add to Google Calendar">
                        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M8 2v4"></path><path d="M16 2v4"></path><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M3 10h18"></path>
                        </svg>
                        <span>GCal</span>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

        </div>
      </template>
    </div>
    </template>

  </div><!-- /.cal-wrap -->

</div>

<!-- Back to top — only in vertical view, appears after 400px scroll -->
<button
  class="back-to-top"
  x-show="viewMode === 'vertical' && showBackToTop"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-y-2"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
  title="Back to top"
>↑</button>

<!-- Event Detail Panel -->
<div class="panel-backdrop"
     x-show="panelOpen"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     @click.self="closePanel()">
  <div class="panel"
       :class="selectedEvent ? getGameClass(selectedEvent.game) : ''"
       @click.stop
       x-show="panelOpen"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2">
    <button class="panel-close" type="button" @click="closePanel()" aria-label="Close">✕</button>

    <div class="panel-header">
      <h2 class="panel-title" x-text="selectedEvent?.title"></h2>
      <div class="panel-meta">
        <span class="tag game" x-text="selectedEvent?.game || 'Unknown'"></span>
        <span class="tag fmt" x-text="selectedEvent?.format || 'Unknown'"></span>
        <span class="panel-past-badge" x-show="selectedEvent && isEventPast(selectedEvent)">Past</span>
      </div>
    </div>

    <div class="panel-body">
      <div class="panel-row">
        <span class="panel-label">WHEN</span>
        <span class="panel-value" x-text="selectedEvent ? formatDateLong(selectedEvent.datetime_start) : ''"></span>
        <span class="panel-value" x-html="selectedEvent ? formatTimeRange(selectedEvent) : ''"></span>
      </div>

      <div class="panel-actions">
        <div class="calendar-dropdown" x-show="canAddToCalendar(selectedEvent)">
          <button class="btn btn-primary" type="button" @click.stop="calendarMenuOpen = !calendarMenuOpen">
            Add to Calendar <span>▾</span>
          </button>
          <div class="calendar-dropdown-menu" x-show="calendarMenuOpen">
            <button type="button" @click.stop="openCalendarProvider(selectedEvent, 'google')">Google Calendar</button>
            <button type="button" @click.stop="openCalendarProvider(selectedEvent, 'apple')">iCalendar (.ics)</button>
            <button type="button" @click.stop="openCalendarProvider(selectedEvent, 'outlook')">Outlook</button>
          </div>
        </div>
        <a class="btn" :href="selectedEvent?.source_url" target="_blank" rel="noopener" x-show="selectedEvent?.source_url">Open Source</a>
        <button class="btn" type="button" @click="shareEvent(selectedEvent)">Share</button>
      </div>
    </div>

    <div class="panel-store" x-show="selectedEvent?.store && storeMeta(selectedEvent.store)">
      <h3>Location</h3>
      <div class="store-name" x-text="selectedEvent?.store"></div>
      <div class="store-address">
        <span class="store-address-indicator">@</span>
        <span x-text="storeMeta(selectedEvent.store)?.address"></span>
      </div>
      <div class="store-links">
        <a class="btn btn-primary"
           :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(storeMeta(selectedEvent.store)?.address || selectedEvent?.store)"
           target="_blank"
           rel="noopener"
           x-show="storeMeta(selectedEvent.store)?.address || selectedEvent?.store">Open in Maps</a>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
